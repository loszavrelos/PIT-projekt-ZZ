<!DOCTYPE html>
<html lang="cs">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Adventures: Cesta k Prvnímu Commitu</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="game-container">
        <header>
            <h1>🐙 GitHub Adventures</h1>
            <p>Epizoda 1: <em>"Ztracen v Terminálu"</em></p>
        </header>

        <main>
            <div id="story-box" class="story-box">
                <!-- Text appears here -->
            </div>

            <div id="input-area" class="input-area hidden">
                <span class="prompt">$</span>
                <input type="text" id="command-input" class="command-input" autocomplete="off"
                    placeholder="Zadej příkaz sem..." autofocus>
            </div>
        </main>

        <footer>
            <p>Vytvořeno pro všechny, kteří kdy brečeli nad merge konfliktem.</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>

</html>
